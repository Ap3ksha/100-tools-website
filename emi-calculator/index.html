<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan EMI Calculator - DevTools 100</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-6">
    <header class="max-w-2xl mx-auto mb-8 flex justify-between items-center">
        <a href="../index.html" class="text-blue-400 hover:underline text-sm">← Back to Home</a>
        <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full">Tool 5 of 100</span>
    </header>

    <main class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-2 text-slate-100">Loan EMI Calculator</h1>
        <p class="text-slate-400 text-sm mb-6">Calculate your monthly loan payments, total interest, and total repayment amount.</p>
        
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-slate-400 text-sm mb-2">Loan Amount ($ or ₹)</label>
                <input type="number" id="loanAmount" placeholder="e.g. 10000" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-400 text-sm mb-2">Interest Rate (% per year)</label>
                    <input type="number" step="0.1" id="interestRate" placeholder="e.g. 7.5" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-slate-400 text-sm mb-2">Tenure (Months)</label>
                    <input type="number" id="tenure" placeholder="e.g. 12" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500">
                </div>
            </div>
            <button onclick="calculateEMI()" class="w-full bg-gradient-to-r from-blue-500 to-emerald-400 text-slate-950 font-bold p-3 rounded-xl hover:opacity-90 transition mt-2">Calculate EMI</button>
        </div>

        <div id="emiResultBox" class="hidden bg-slate-950 border border-slate-800 p-6 rounded-xl space-y-4">
            <div class="text-center border-b border-slate-800 pb-4">
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold block mb-1">Monthly EMI Payment</span>
                <span id="monthlyEmi" class="text-3xl font-extrabold text-emerald-400">0.00</span>
            </div>
            <div class="grid grid-cols-2 gap-4 text-center text-sm pt-2">
                <div>
                    <span class="text-slate-500 block mb-1">Total Interest</span>
                    <span id="totalInterest" class="font-bold text-slate-300">0.00</span>
                </div>
                <div>
                    <span class="text-slate-500 block mb-1">Total Payment</span>
                    <span id="totalPayment" class="font-bold text-slate-300">0.00</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateEMI() {
            const loanAmount = parseFloat(document.getElementById('loanAmount').value);
            const yearlyRate = parseFloat(document.getElementById('interestRate').value);
            const months = parseInt(document.getElementById('tenure').value);

            if (!loanAmount || !yearlyRate || !months || loanAmount <= 0 || yearlyRate <= 0 || months <= 0) {
                alert("Please enter valid positive loan details.");
                return;
            }

            // Monthly interest rate calculation
            const monthlyRate = (yearlyRate / 12) / 100;

            // EMI formula calculation
            const emi = (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            const totalPayable = emi * months;
            const totalInterestPayable = totalPayable - loanAmount;

            document.getElementById('monthlyEmi').textContent = emi.toFixed(2);
            document.getElementById('totalInterest').textContent = totalInterestPayable.toFixed(2);
            document.getElementById('totalPayment').textContent = totalPayable.toFixed(2);

            document.getElementById('emiResultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
