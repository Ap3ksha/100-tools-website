<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100+ Multi-Tool Platform</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="border-b border-slate-800 p-6 bg-slate-900/50 backdrop-blur">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                🔧 DevTools 100
            </h1>
            <span class="text-sm bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">
                Tool 1 of 100 Live
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl w-full mx-auto p-6 flex-grow">
        
        <!-- Tool 1: Word Counter Section -->
        <section class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl max-w-2xl mx-auto mt-8">
            <h2 class="text-xl font-semibold mb-2 text-slate-200">Tool #1: Real-time Word & Character Counter</h2>
            <p class="text-slate-400 text-sm mb-6">Type or paste your text below to instantly get word, character, and paragraph metrics.</p>
            
            <textarea id="textInput" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-slate-100 focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-600" placeholder="Start typing here..."></textarea>
            
            <!-- Counter Grid -->
            <div class="grid grid-cols-3 gap-4 mt-6">
                <div class="bg-slate-950 border border-slate-800/50 p-4 rounded-xl text-center">
                    <div id="charCount" class="text-2xl font-bold text-blue-400">0</div>
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold mt-1">Characters</div>
                </div>
                <div class="bg-slate-950 border border-slate-800/50 p-4 rounded-xl text-center">
                    <div id="wordCount" class="text-2xl font-bold text-emerald-400">0</div>
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold mt-1">Words</div>
                </div>
                <div class="bg-slate-950 border border-slate-800/50 p-4 rounded-xl text-center">
                    <div id="paraCount" class="text-2xl font-bold text-purple-400">0</div>
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold mt-1">Paragraphs</div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 p-6 text-center text-sm text-slate-600 bg-slate-950">
        <p>© 2026 My 100 Tools Project. Building 1 tool every single day.</p>
    </footer>

    <!-- JavaScript logic for Tool #1 -->
    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const paraCount = document.getElementById('paraCount');

        textInput.addEventListener('input', () => {
            const text = textInput.value;
            
            // Character count
            charCount.textContent = text.length;
            
            // Word count
            const words = text.trim().split(/\s+/).filter(item => item.length > 0);
            wordCount.textContent = words.length;
            
            // Paragraph count
            const paragraphs = text.split(/\n+/).filter(item => item.trim().length > 0);
            paraCount.textContent = paragraphs.length;
        });
    </script>
</body>
</html>
