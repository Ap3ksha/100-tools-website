<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator - DevTools 100</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-6">
    <header class="max-w-2xl mx-auto mb-8 flex justify-between items-center">
        <a href="../index.html" class="text-blue-400 hover:underline text-sm">← Back to Home</a>
        <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full">Tool 2 of 100</span>
    </header>

    <main class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-2 text-slate-100">Random Password Generator</h1>
        <p class="text-slate-400 text-sm mb-6">Generate a strong, secure password instantly.</p>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="passwordOutput" readonly placeholder="Your secure password" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500">
            <button onclick="copyPassword()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 rounded-xl font-medium transition">Copy</button>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <label class="text-slate-300 text-sm">Password Length: <span id="lengthVal" class="text-blue-400 font-bold">12</span></label>
                <input type="range" id="passwordLength" min="8" max="30" value="12" oninput="document.getElementById('lengthVal').innerText = this.value" class="w-2/3 accent-blue-500">
            </div>
            <button onclick="generatePassword()" class="w-full bg-gradient-to-r from-blue-500 to-emerald-400 text-slate-950 font-bold p-3 rounded-xl hover:opacity-90 transition mt-2">Generate Password</button>
        </div>
    </main>

    <script>
        function generatePassword() {
            const length = document.getElementById('passwordLength').value;
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
            let password = "";
            
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charset.length);
                password += charset[randomIndex];
            }
            
            document.getElementById('passwordOutput').value = password;
        }

        function copyPassword() {
            const passwordField = document.getElementById('passwordOutput');
            if (!passwordField.value) return;
            
            passwordField.select();
            navigator.clipboard.writeText(passwordField.value);
            alert("Password copied to clipboard!");
        }
    </script>
</body>
</html>
