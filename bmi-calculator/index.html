<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - DevTools 100</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-6">
    <header class="max-w-2xl mx-auto mb-8 flex justify-between items-center">
        <a href="../index.html" class="text-blue-400 hover:underline text-sm">← Back to Home</a>
        <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full">Tool 3 of 100</span>
    </header>

    <main class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-2 text-slate-100">BMI Calculator</h1>
        <p class="text-slate-400 text-sm mb-6">Enter your weight and height below to calculate your Body Mass Index (BMI).</p>
        
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-slate-400 text-sm mb-2">Weight (kg)</label>
                <input type="number" id="weight" placeholder="e.g. 70" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-slate-400 text-sm mb-2">Height (cm)</label>
                <input type="number" id="height" placeholder="e.g. 175" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="calculateBMI()" class="w-full bg-gradient-to-r from-blue-500 to-emerald-400 text-slate-950 font-bold p-3 rounded-xl hover:opacity-90 transition mt-2">Calculate BMI</button>
        </div>

        <!-- Result Box (Hidden by default) -->
        <div id="resultBox" class="hidden bg-slate-950 border border-slate-800 p-6 rounded-xl text-center">
            <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold block mb-1">Your BMI Score</span>
            <span id="bmiValue" class="text-3xl font-extrabold text-blue-400 block mb-2">22.5</span>
            <span id="bmiStatus" class="inline-block text-xs font-bold px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Normal Weight</span>
        </div>
    </main>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const heightCm = parseFloat(document.getElementById('height').value);
            const resultBox = document.getElementById('resultBox');
            const bmiValue = document.getElementById('bmiValue');
            const bmiStatus = document.getElementById('bmiStatus');

            if (!weight || !heightCm || weight <= 0 || heightCm <= 0) {
                alert("Please enter valid weight and height measurements.");
                return;
            }

            // Convert height from cm to meters
            const heightMers = heightCm / 100;
            const bmi = (weight / (heightMers * heightMers)).toFixed(1);

            bmiValue.textContent = bmi;
            resultBox.classList.remove('hidden');

            // Determine health status category & styles
            if (bmi < 18.5) {
                bmiStatus.textContent = "Underweight";
                bmiStatus.className = "inline-block text-xs font-bold px-3 py-1 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20";
            } else if (bmi >= 18.5 && bmi <= 24.9) {
                bmiStatus.textContent = "Normal Weight";
                bmiStatus.className = "inline-block text-xs font-bold px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            } else if (bmi >= 25 && bmi <= 29.9) {
                bmiStatus.textContent = "Overweight";
                bmiStatus.className = "inline-block text-xs font-bold px-3 py-1 rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/20";
            } else {
                bmiStatus.textContent = "Obese";
                bmiStatus.className = "inline-block text-xs font-bold px-3 py-1 rounded-full bg-red-500/10 text-red-400 border border-red-500/20";
            }
        }
    </script>
</body>
</html>
