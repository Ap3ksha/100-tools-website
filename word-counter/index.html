<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Word & Character Counter - DevTools 100</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-6">
    <header class="max-w-2xl mx-auto mb-8 flex justify-between items-center">
        <a href="../index.html" class="text-blue-400 hover:underline text-sm">← Back to Home</a>
        <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full">Tool 1 of 100</span>
    </header>

    <main class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-2 text-slate-100">Real-time Word & Character Counter</h1>
        <p class="text-slate-400 text-sm mb-6">Type or paste your text below to instantly get word, character, and paragraph metrics.</p>
        
        <textarea id="textInput" rows="8" placeholder="Type or paste your text here..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition mb-6 resize-y"></textarea>
        
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-center">
                <span id="charCount" class="block text-2xl font-bold text-blue-400">0</span>
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Characters</span>
            </div>
            <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-center">
                <span id="wordCount" class="block text-2xl font-bold text-emerald-400">0</span>
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Words</span>
            </div>
            <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-center">
                <span id="paraCount" class="block text-2xl font-bold text-purple-400">0</span>
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Paragraphs</span>
            </div>
        </div>
    </main>

    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const paraCount = document.getElementById('paraCount');

        textInput.addEventListener('input', () => {
            const text = textInput.value;
            charCount.textContent = text.length;
            
            const words = text.trim().split(/\s+/).filter(item => item.trim().length > 0);
            wordCount.textContent = words.length;
            
            const paragraphs = text.split(/\n+/).filter(item => item.trim().length > 0);
            paraCount.textContent = paragraphs.length;
        });
    </script>
</body>
</html>
